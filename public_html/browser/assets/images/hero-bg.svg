<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#1565c0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:0.9" />
    </linearGradient>
    <pattern id="heroPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="2" fill="white" opacity="0.1"/>
      <circle cx="75" cy="75" r="1.5" fill="white" opacity="0.08"/>
      <circle cx="50" cy="10" r="1" fill="white" opacity="0.05"/>
      <circle cx="90" cy="40" r="1" fill="white" opacity="0.05"/>
      <circle cx="10" cy="80" r="0.8" fill="white" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#heroGradient)"/>
  <rect width="1920" height="1080" fill="url(#heroPattern)"/>

  <!-- Decorative elements -->
  <circle cx="1600" cy="200" r="150" fill="white" opacity="0.05"/>
  <circle cx="200" cy="800" r="200" fill="white" opacity="0.03"/>
  <circle cx="1700" cy="700" r="100" fill="white" opacity="0.04"/>

  <!-- Geometric shapes -->
  <polygon points="1500,100 1600,50 1650,150" fill="white" opacity="0.06"/>
  <polygon points="200,600 300,550 250,650" fill="white" opacity="0.04"/>
</svg>